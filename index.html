<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Norwegian Ferry Routes</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
    .legend {
      background: white;
      padding: 10px;
      line-height: 20px;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const map = L.map("map", {
  center: [64.8, 12.5],
  zoom: 5,
  minZoom: 4,
  maxBounds: [
    [57.0, 3.0],
    [72.0, 34.0]
  ]
});

// Norway background
fetch("assets/data/norway.geojson")
  .then(r => r.json())
  .then(data => {
    L.geoJSON(data, {
      style: {
        color: "#444",
        weight: 1,
        fillColor: "grey",
        fillOpacity: 1
      }
    }).addTo(map);
  });

// Ferry routes
fetch("assets/data/routes.geojson")
  .then(r => r.json())
  .then(data => {
    const freeRoutes = L.geoJSON(data, {
      filter: f => !f.properties.selected,
      style: {
        color: "blue",
        weight: 4,
        opacity: 1
      },
      onEachFeature: function(feature, layer) {
        layer.bindPopup(
          "<b>Route:</b> " + feature.properties.name + "<br>" +
          "<b>ID:</b> " + feature.properties.id
        );
      }
    }).addTo(map);

    const notFreeRoutes = L.geoJSON(data, {
      filter: f => f.properties.selected,
      style: {
        color: "red",
        weight: 4,
        opacity: 1
      },
      onEachFeature: function(feature, layer) {
        layer.bindPopup(
          "<b>Route:</b> " + feature.properties.name + "<br>" +
          "<b>ID:</b> " + feature.properties.id
        );
      }
    }).addTo(map);

    L.control.layers(null, {
      "Free ferry routes": freeRoutes,
      "Not free ferry routes": notFreeRoutes
    }, {collapsed: false}).addTo(map);
  });

// Legend
const legend = L.control({position: "bottomright"});
legend.onAdd = function () {
  const div = L.DomUtil.create("div", "legend");
  div.innerHTML = `
    <b>Legend</b><br>
    <span style="color:blue;">━</span> Free ferry routes<br>
    <span style="color:red;">━</span> Not free ferry routes
  `;
  return div;
};
legend.addTo(map);
</script>

</body>
</html>
